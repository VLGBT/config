#     G28 Z
#   {% endif %}
#     T1
#     G90
#     G1 X{x_center} Y{y_center}  F{printer.configfile.settings.printer.max_velocity*60*0.7}
#     G1 Z5 F{printer.configfile.settings.printer.max_z_velocity*60}
#     SET_FAN_SPEED FAN=extruder_fan SPEED=0.7
#     {% set TARGET_TEMP = params.TARGET_TEMP|default(300)|float %} 
#     PID_CALIBRATE HEATER=extruder1 TARGET={TARGET_TEMP}
#     M118 Калибровка PID второго экструдера завершена
#     TURN_OFF_HEATERS
#     SAVE_CONFIG  
# [gcode_macro PID_DAS]
# description: Макрос для калибровки ПИД DAS
# gcode: 
#     SET_FAN_SPEED FAN=extruder_fan SPEED=0.5
#     {% set TARGET_TEMP = params.TARGET_TEMP|default(100)|float %} 
#     PID_CALIBRATE HEATER=DAS TARGET={TARGET_TEMP}
#     M118 Калибровка PID DAS первого экструдера завершена
#     TURN_OFF_HEATERS
#     SAVE_CONFIG
# [gcode_macro PID_BED]
# description: Макрос для калибровки ПИД Стола
# gcode: 
#   {% set TARGET_TEMP = params.TARGET_TEMP|default(100)|float %}
#   # SET_LED LED=status_bar GREEN=1 RED=1 BLUE=0
#   PID_CALIBRATE HEATER=heater_bed TARGET={TARGET_TEMP}
#   M118 Калибровка PID нагревательного стола завершена
#   # SET_LED LED=status_bar GREEN=0 RED=0 BLUE=1
#   TURN_OFF_HEATERS
#   SAVE_CONFIG
# [gcode_macro PID_CHAMBER]
# description: Макрос для калибровки ПИД Термокамеры
# gcode: 
#   {% set TARGET_TEMP = params.TARGET_TEMP|default(100)|float %}
#   # SET_LED LED=status_bar GREEN=1 RED=1 BLUE=0
#   PID_CALIBRATE HEATER=chamber TARGET={TARGET_TEMP}
#   M118 Калибровка PID термокамеры завершена
#   # SET_LED LED=status_bar GREEN=0 RED=0 BLUE=1
#   TURN_OFF_HEATERS
#   SAVE_CONFIG

[gcode_macro CANCEL_PRINT]
description: Отмена текущей печати
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  M106 S0
  G28 X 
  M84
  M118 Печать отменена
  SDCARD_RESET_FILE
  CANCEL_PRINT_BASE
  SET_IDLE_TIMEOUT TIMEOUT=3600

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    ##### set park positon for x and y #####
    # default is your max posion from your printer.cfg
    {% if printer.toolhead.extruder == "extruder"%}
      {% set x_park = printer.configfile.config.stepper_x.position_endstop|int %}
    {% else %}
      {% set x_park = printer.configfile.config.dual_carriage.position_endstop|int %}
    {% endif %}
      ##### calculate save lift position #####
      {% set max_z = printer.toolhead.axis_maximum.z|float %}
      {% set act_z = printer.toolhead.position.z|float %}
      {% if act_z < (max_z - 20) %}
         {% set z_safe = 20 %}
      {% else %}
         {% set z_safe = max_z - act_z %}
     {% endif %}
      PAUSE_BASE
     M118 Пауза!
     G91
      {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{E} F2100
     {% else %}
       {action_respond_info("Экструдер недостаточно горячий")}
     {% endif %}
      {% if "xyz" in printer.toolhead.homed_axes %}
        G1 Z{z_safe} F{printer.configfile.config.stepper_z.homing_speed|int*60}
        G90
        G1 X{x_park} F{printer.configfile.config.stepper_x.homing_speed|int*60}
      {% else %}
        {action_respond_info("Парковка не выполнена")}
      {% endif %}
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    #### get VELOCITY parameter if specified ####
    {% if 'VELOCITY' in params|upper %}
      {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
    {%else %}
      {% set get_params = "" %}
    {% endif %}
    ##### end of definitions #####
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G91
      G1 E{E} F2100
    {% else %}
      {action_respond_info("Экструдер недостаточно горячий")}
    {% endif %}  
    RESUME_BASE {get_params}
    M118 Продолжение печати!
    # SET_LED LED=status_bar GREEN=0 RED=0 BLUE=1

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  50
variable_purge_distance:  50
gcode:
  M83
  G1 E100 F1500

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  100
variable_purge_distance:  25
gcode:
  M83
  G1 E-100 F1500

[gcode_macro M106]
# rename_existing: M106.1
variable_last_speed: 0 # переменная хранящая последнюю заданную скорость, используется в IDEX 
gcode:
  {% set s = params.S|default(255)|int %}
  SET_GCODE_VARIABLE MACRO=M106 VARIABLE=last_speed VALUE={s}
  {% set speed = s / 255|float %} #перевод диапазона значений от 0..255 в 0..1
  # если переключаемые головы, то каждая управляется отдельно:
  {% if printer.dual_carriage.carriage_1 == "INACTIVE" or printer.dual_carriage.carriage_1 == "PRIMARY" %} 
    SET_FAN_SPEED FAN={printer.toolhead.extruder}_fan SPEED={speed}
    # противоположная выключается
    {% if s == 0 %}
      SET_HEATER_TEMPERATURE HEATER=DAS TARGET=0
      SET_FAN_SPEED FAN=extruder_fan SPEED={speed}
    {% else %}
      SET_FAN_SPEED FAN=extruder_fan SPEED={speed}
    {% endif %}
  # если зависмые головы (копия, зеркало) вертиляторы работают синхронно:
  {% else %}
    SET_FAN_SPEED FAN=extruder_fan  SPEED={speed}
    SET_FAN_SPEED FAN=extruder1_fan SPEED={speed}
  {% endif %}




[gcode_macro M107]
gcode:
  SET_HEATER_TEMPERATURE HEATER=DAS TARGET=0
  M106 S0

[gcode_macro REMOVE_USB]
description: Извлечение флешки USB
gcode:
    RUN_SHELL_COMMAND CMD=REMOVE

[gcode_macro INSTALL_USB]
description: Монтирование флешки USB
gcode:
    RUN_SHELL_COMMAND CMD=INSTALL

[gcode_macro _SHUTDOWN]
gcode:
  SET_LED LED=status_bar GREEN=0 RED=0 BLUE=0 
  M84
  M107
  TURN_OFF_HEATERS
  SET_PIN PIN=Cooler VALUE=0
  SET_LED LED=LED WHITE=0                                  
    {action_respond_info('action:poweroff')}          ; OctoPrint compatible host shutdown
	{action_call_remote_method("shutdown_machine")}   ; Moonraker compatible host shutdown

