# [gcode_macro PID_EXTRUDER1]
# description: Макрос для калибровки ПИД Экструдера 1
# gcode: 
#   {% set travel_speed = printer.toolhead.max_velocity|int %}
#   {% set x_center = printer.toolhead.axis_maximum.x|float  / 2 %}
#   {% set y_center = printer.toolhead.axis_maximum.y|float  / 2 %}
#   {% if "xyz" not in printer.toolhead.homed_axes %}
#     G28
