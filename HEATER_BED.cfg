
[temperature_sensor B1]
sensor_type:ATC Semitec 104GT-2
sensor_pin:PB1
min_temp:-100
max_temp:260
[temperature_sensor B2]
sensor_type:ATC Semitec 104GT-2
sensor_pin:PB0
min_temp:-100
max_temp:260

[verify_heater heater_bed] #Защита от перегрева экструдера
max_error: 200
check_gain_time:60
hysteresis: 15
heating_gain: 1
