[homing_override]
gcode:
    G28 Z
    G28 Y
    G28 X
axes: xy
[stepper_x]
step_pin: PE6
dir_pin: !PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF4
position_min:-100
position_endstop: -100
position_max: 420
homing_speed: 70
# step_pulse_duration:0.000000100 #Стандартное 0.000000100
# [tmc2209 stepper_x]
# uart_pin: PC13
# #diag_pin: PF5
# # interpolate: True
# run_current: 1.15
[tmc5160 stepper_x]
cs_pin:PC13
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
interpolate: True
run_current:1.2
# stealthchop_threshold: 999999
