#///////////////////////////Прочее/////////////////////////
[save_variables]
filename: /home/biqu/printer_data/config/variables.cfg
[respond]
[pause_resume]
[display_status]
[include macros.cfg] 
[include shell_command.cfg]
[force_move]
enable_force_move: True
[exclude_object]
[gcode_arcs]
resolution: 0.1
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode:
    RESPOND TYPE=error MSG="Ошибка печати"
    M84
    TURN_OFF_HEATERS
[idle_timeout]
gcode:
    SET_LED LED=LED WHITE=0
    TURN_OFF_HEATERS
    M84
timeout: 7200
[bed_mesh] #Сетка автокалбировки
speed: 120 #Скрость перемещения XY при автокалбировке
horizontal_move_z: 3 #Величина перемещения Z при автокалбировке
mesh_min: 32, 11 #Минимальная точка калибровки
mesh_max: 268, 199 #Максимальная точка калибровки
probe_count: 6, 6 #Сетка автокалибровки (количество точек)
algorithm: bicubic #Алгоритм автокалибровки
[output_pin _Chamber]
pin: PF5
value:1
shutdown_value:0
[output_pin _Water]
pin: PA4
value:1
shutdown_value:0
[temperature_fan _EBB1]
pin: PA0
min_speed: 0
max_speed: 0.6
target_temp: 50
min_temp:0
max_temp:90
sensor_type: temperature_mcu
sensor_mcu:extruder
control:watermark
# pid_Kp:100
# pid_Ki:100
# pid_Kd:100
[input_shaper]
## The section is intentionally empty
[delayed_gcode init_shaper]
initial_duration: 0.1
gcode:
   SET_DUAL_CARRIAGE CARRIAGE=1
   SET_INPUT_SHAPER SHAPER_TYPE_X=<dual_carriage_shaper> SHAPER_FREQ_X=<dual_carriage_freq> SHAPER_TYPE_Y=<y_shaper> SHAPER_FREQ_Y=<y_freq>
   SET_DUAL_CARRIAGE CARRIAGE=0
   SET_INPUT_SHAPER SHAPER_TYPE_X=<primary_carriage_shaper> SHAPER_FREQ_X=<primary_carriage_freq> SHAPER_TYPE_Y=<y_shaper> SHAPER_FREQ_Y=<y_freq>

