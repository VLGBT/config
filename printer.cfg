#Конфигурация для FA A4
#Manta M8P 2.0 
#CB1

#///////////////////////////MCU's//////////////////////////
[mcu]
canbus_uuid: a7769a849283 
[temperature_sensor Хост] #Температурный сенсор хоста
sensor_type: temperature_host
min_temp: 0
max_temp: 90

#///////////////////////////КИНЕМАТИКА XYZ/////////////////
[printer] #Конфигурация ограничений принтера 
kinematics: hybrid_corexy #Кинематика
max_velocity: 150 #Максимальная скорость
max_accel: 2000 #Максимальное ускорение
max_z_velocity: 20 #Максимальня скорость оси Z
max_z_accel: 500 #Максимальное ускорение по оси Z

# [safe_z_home]
# home_xy_position: 150,105
# #   A X, Y coordinate (e.g. 100, 100) where the Z homing should be
# #   performed. This parameter must be provided.
# speed: 70.0
# #   Speed at which the toolhead is moved to the safe Z home
# #   coordinate. The default is 50 mm/s
# z_hop: 0
# #   Distance (in mm) to lift the Z axis prior to homing. This is
# #   applied to any homing command, even if it doesn't home the Z axis.
# #   If the Z axis is already homed and the current Z position is less
# #   than z_hop, then this will lift the head to a height of z_hop. If
# #   the Z axis is not already homed the head is lifted by z_hop.
# #   The default is to not implement Z hop.
# z_hop_speed: 15.0
# #   Speed (in mm/s) at which the Z axis is lifted prior to homing. The
# #   default is 15 mm/s.
# #move_to_previous: False
# #   When set to True, the X and Y axes are reset to their previous
# #   positions after Z axis homing. The default is False.

[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min:-67
position_endstop: -67
position_max: 305
homing_speed: 50
homing_retract_dist:0
[tmc2209 stepper_x]
uart_pin:PC13
diag_pin:^PF4
driver_SGTHRS: 130
stealthchop_threshold: 999999
# interpolate: True
run_current:1.1
[dual_carriage]
axis:x
# safe_distance:100
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16  
rotation_distance: 40
endstop_pin: tmc2209_dual_carriage:virtual_endstop
position_endstop: 367
position_max: 367
position_min:0
homing_speed: 50
homing_retract_dist:0
[tmc2209 dual_carriage]
uart_pin:PE3
diag_pin:^PF3
driver_SGTHRS: 130
stealthchop_threshold: 999999
# interpolate: True
run_current:1.1
[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min:-2
position_endstop: -2#-2
position_max: 210
homing_speed: 40
homing_retract_dist:0
[tmc2209 stepper_y]
uart_pin:PB9
diag_pin:^PF2
driver_SGTHRS: 130
stealthchop_threshold: 999999
# interpolate: True
run_current:1.1
[stepper_y1]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y1:virtual_endstop
[tmc2209 stepper_y1]
uart_pin:PB5
diag_pin:^PF1
driver_SGTHRS: 130
stealthchop_threshold: 999999
# interpolate: True
run_current:1.1
[stepper_z]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 212
# position_endstop: 0
position_min: -3
homing_speed: 10
# homing_retract_dist:0
# second_homing_speed: 8
[tmc2209 stepper_z]
uart_pin: PG14
diag_pin: ^PF0
interpolate: True
run_current: 1.2

#///////////////////////////Экструдер0////////////////////
[mcu extruder]
canbus_uuid: 7b595458c835
# [temperature_sensor EBB_1]
# sensor_type: temperature_mcu
# sensor_mcu:extruder
# min_temp: 0
# max_temp: 150
[filament_switch_sensor 1]
pause_on_runout: False
runout_gcode:
    RESPOND TYPE=error MSG="Закончился филамент в первом экструдере"
    PAUSE
event_delay: 3.0
switch_pin: extruder:PB8
[filament_motion_sensor 1m]
detection_length: 2.88
extruder:extruder
switch_pin:extruder:PB9
pause_on_runout:False
runout_gcode:
    RESPOND TYPE=error MSG="Движение филамента в первом экстудере затруднено"
    PAUSE
#insert_gcode:
#event_delay:
# pause_delay:
[extruder] #Секция конфигурации экструдера
step_pin: extruder:PD0
dir_pin: extruder:PD1
enable_pin: !extruder:PD2
microsteps: 16
rotation_distance: 4.726
nozzle_diameter: 1.2
filament_diameter: 1.8 #При смене филамента проверяйте это значение по факту, к примеру катушки НИТ могут быть нестанартного диаметра 
heater_pin: extruder:PB13 # 
sensor_pin: extruder:PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
control = pid
pid_kp = 29.643
pid_ki = 2.272
pid_kd = 96.712
min_temp: -100
max_temp: 280
min_extrude_temp:0
max_extrude_only_distance: 200
pressure_advance: 0 #Это значение должно быть откалибровано для каждого вида пластика, ввиду различной текучести материалов 
pressure_advance_smooth_time: 0.040 
[tmc2209 extruder] #Секция конфигурации драйвера  экструдера
uart_pin: extruder:PA15
run_current: 0.9
[verify_heater extruder] #Защита от перегрева экструдера
max_error: 200
check_gain_time:20
hysteresis: 50
heating_gain: 2
[adxl345 Ex0]
cs_pin:extruder:PB12
spi_speed: 5000000
spi_software_sclk_pin:extruder:PB10
spi_software_mosi_pin:extruder:PB11
spi_software_miso_pin:extruder:PB2
axes_map: z, x, y
rate: 3200
[resonance_tester]
accel_chip: adxl345 Ex1
probe_points:
    150,105,100  # X100, Y100, Z20
min_freq: 5
max_freq: 133
accel_per_hz: 75
hz_per_sec: 2
[probe] ##Секция конфигурации датчика автокалибровки
pin:^extruder:PB6
x_offset: -32 #Расстояние от сопла до датчика автокалибровки
y_offset: 11
#z_offset = -1.099
speed:10 #Скорость поднятия Z при автокалибровке
samples: 1 #Количество попыток калбировки на одной точке
sample_retract_dist: 1
[fan_generic extruder_fan] #Вентилятор
pin: !PF8
enable_pin:PA5
hardware_pwm: False
cycle_time: 0.005
off_below: 0.1
kick_start_time: 0.1
shutdown_speed: 0
#///////////////////////////Экструдер1/////////////////////
[mcu extruder1]
canbus_uuid: d41beeb20007
[temperature_sensor EBB_2]
sensor_type: temperature_mcu
