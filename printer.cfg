#///////////////////////////Термокамера////////////////////
[heater_generic chamber] #Нагреватель термокамеры
heater_pin: PF9
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PB0
control: watermark
#pid_Kp:33.011
#pid_Ki:0.125
#pid_Kd:2187.370
