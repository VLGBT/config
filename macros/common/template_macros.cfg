[gcode_macro _IDEX_MODE_PROMPT]
gcode:
  	{% if printer.configfile.config.dual_carriage is defined %}
    	{% if printer.toolhead.extruder != 'extruder' %}
    	  ACTIVATE_EXTRUDER EXTRUDER=extruder
   	 {% endif %}
    	{% set current_mode = printer["gcode_macro _IDEX_MODE"].mode %}
    	{% if current_mode != 'primary' %}
    	  _IDEX_MODE MODE=primary
   	 {% endif %}
 	 {% endif %}
  	RESPOND TYPE=command MSG="action:prompt_begin Выберите режим печати"
  	RESPOND TYPE=command MSG="action:prompt_text Возможные режимы"
  	RESPOND TYPE=command MSG='action:prompt_footer_button Основной | _IDEX_MODE MODE=primary|primary'
 	 RESPOND TYPE=command MSG="action:prompt_footer_button Копирующий | _IDEX_MODE MODE=copy|secondary"
  	RESPOND TYPE=command MSG="action:prompt_footer_button Зеркальный | _IDEX_MODE MODE=mirror|info"
 	 RESPOND TYPE=command MSG="action:prompt_show"
	 
[gcode_macro _LED_STATE]
gcode:
	{% if printer.configfile.config['neopixel status_bar'] is defined %}
		{% set colors = {
					'printing': {'R': 0, 'G': 0, 'B': 1},
					'warning':  {'R': 1, 'G': 1, 'B': 0},
					'cancel':   {'R': 1, 'G': 0, 'B': 0},
					'done':     {'R': 0, 'G': 1, 'B': 0},
		} %}
		{% set state = params.STATE|default('')|string|lower %}
		{% set c = colors[state] %}
		SET_LED LED=status_bar RED={c.R} GREEN={c.G} BLUE={c.B}
	{% endif %}

[delayed_gcode Water_status]
initial_duration: 3.0
gcode:
	{% if printer["gcode_button Water_sensor"] is defined %}
		{% if printer["gcode_button Water_sensor"].state == 'PRESSED' %}
			M118 Уровень воды в норме!
		{% else %}
			RESPOND TYPE=error MSG="Уровень воды низкий, залейте воду!"
			UPDATE_DELAYED_GCODE ID=Water_status DURATION=300
		{% endif %}
	{% endif %}
[delayed_gcode Initial]
initial_duration: 1.0
gcode:
	{% set max_count = printer.configfile.config['neopixel status_bar'].chain_count|int %}
	{% set half_count = max_count / 2 %}
	{% for i in range(1, half_count|int ) %}
    	SET_LED LED=status_bar INDEX={i} GREEN=0 RED=0 BLUE=1
		SET_LED LED=status_bar INDEX={half_count|int + i} GREEN=0 RED=0 BLUE=1
    	G4 P70
    {% endfor %}